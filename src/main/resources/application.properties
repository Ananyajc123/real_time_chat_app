server.port=8082

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/chatapp
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# JWT
app.jwt.secret=chat-app-super-secret-key-256-bits-minimum-length-required-here
app.jwt.expiration=86400000

# Chat config
app.chat.max-message-length=1000
app.chat.history-limit=50

logging.level.com.chatapp=INFO
spring.main.allow-circular-references=true
